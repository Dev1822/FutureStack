<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <link rel="icon" type="image/png" href="%PUBLIC_URL%/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#000000" />

  <!-- Primary Meta Tags -->
  <title>FutureTracker - Track Internships, Hackathons & Job Applications</title>
  <meta name="title" content="FutureTracker - Track Internships, Hackathons & Job Applications" />
  <meta name="description"
    content="Free opportunity tracker for students and developers. Organize job applications, track internship stages, never miss hackathon deadlines. Kanban boards, calendar view, and PDF reports." />
  <meta name="keywords"
    content="job tracker, internship tracker, hackathon tracker, application tracker, career tracker, job application organizer, student tools, developer tools, opportunity tracker" />
  <meta name="author" content="FutureTracker" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://futuretracker.online/" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://futuretracker.online/" />
  <meta property="og:title" content="FutureTracker - Track Internships, Hackathons & Job Applications" />
  <meta property="og:description"
    content="Free opportunity tracker for students and developers. Organize job applications, track internship stages, never miss hackathon deadlines." />
  <meta property="og:image" content="https://futuretracker.online/og-image.png" />
  <meta property="og:site_name" content="FutureTracker" />
  <meta property="og:locale" content="en_US" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="https://futuretracker.online/" />
  <meta name="twitter:title" content="FutureTracker - Track Internships, Hackathons & Job Applications" />
  <meta name="twitter:description"
    content="Free opportunity tracker for students and developers. Organize job applications, track internship stages, never miss hackathon deadlines." />
  <meta name="twitter:image" content="https://futuretracker.online/og-image.png" />

  <!-- PWA/Mobile -->
  <link rel="apple-touch-icon" href="%PUBLIC_URL%/favicon.png" />
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

  <!-- Fonts - Optimized with preload -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Use media="print" trick to load async without JavaScript dependency -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    media="print" onload="this.media='all'">
  <noscript>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </noscript>

  <!-- Structured Data (JSON-LD) - WebApplication -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "FutureTracker",
      "url": "https://futuretracker.online",
      "description": "Track internships, hackathons, and job applications for students and developers. Kanban boards, calendar view, deadline reminders, and PDF reports.",
      "applicationCategory": "ProductivityApplication",
      "operatingSystem": "Web",
      "browserRequirements": "Requires JavaScript. Requires HTML5.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "Internship Application Tracking",
        "Hackathon Deadline Management",
        "Kanban Status Board",
        "Calendar View",
        "PDF Report Export",
        "Analytics Dashboard"
      ]
    }
    </script>

  <!-- Structured Data (JSON-LD) - Organization -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "FutureTracker",
      "url": "https://futuretracker.online",
      "logo": "https://futuretracker.online/logo512.png",
      "sameAs": [
        "https://github.com/Venkat-Kolasani/FutureStack"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "url": "https://github.com/Venkat-Kolasani/FutureStack/issues"
      }
    }
    </script>

  <!-- Structured Data (JSON-LD) - FAQ -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is FutureTracker?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "FutureTracker is a free opportunity tracker for students and developers to organize job applications, track internship stages, and never miss hackathon deadlines."
          }
        },
        {
          "@type": "Question",
          "name": "Is FutureTracker free to use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, FutureTracker is completely free to use. You can track unlimited opportunities, use the Kanban board, calendar view, and export PDF reports at no cost."
          }
        },
        {
          "@type": "Question",
          "name": "What features does FutureTracker offer?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "FutureTracker offers internship and hackathon tracking, a Kanban-style status board, calendar view for deadlines, analytics dashboard, and PDF report generation."
          }
        }
      ]
    }
    </script>

  <!-- Theme FOUC Prevention Script -->
  <script>
    (function () {
      var theme = null;
      try {
        theme = localStorage.getItem('futurestack-theme');
      } catch (e) { }
      if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    })();
  </script>
</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
</body>

</html>
